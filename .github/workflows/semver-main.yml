name: Semver Checks (main)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  semver:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-semver-checks
      uses: taiki-e/install-action@cargo-semver-checks

    - name: Select semver baseline
      id: semver-baseline
      shell: bash
      run: |
        if git rev-parse --verify --quiet "2.0.0^{commit}" >/dev/null; then
          echo "baseline_rev=2.0.0" >> "$GITHUB_OUTPUT"
          echo "release_type=patch" >> "$GITHUB_OUTPUT"
          echo "Using 2.0.0 as semver baseline."
        elif git rev-parse --verify --quiet "1.3.0^{commit}" >/dev/null; then
          echo "baseline_rev=1.3.0" >> "$GITHUB_OUTPUT"
          echo "release_type=major" >> "$GITHUB_OUTPUT"
          echo "::notice::2.0.0 baseline ref not found; checking this branch as a major release against 1.3.0."
        else
          echo "::error::Neither 2.0.0 nor fallback 1.3.0 semver baseline refs exist."
          exit 1
        fi

    - name: Check semver compatibility against selected baseline
      run: cargo semver-checks check-release --manifest-path Cargo.toml --baseline-rev "${{ steps.semver-baseline.outputs.baseline_rev }}" --release-type "${{ steps.semver-baseline.outputs.release_type }}" --only-explicit-features

    - name: Check semver compatibility against selected baseline with yaml-rust2
      run: cargo semver-checks check-release --manifest-path Cargo.toml --baseline-rev "${{ steps.semver-baseline.outputs.baseline_rev }}" --release-type "${{ steps.semver-baseline.outputs.release_type }}" --only-explicit-features --features yaml-rust2
